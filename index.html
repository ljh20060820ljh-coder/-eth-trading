<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多币种 AI 看盘工具</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#070b12;--bg2:#0d1421;--bg3:#111c2e;--gold:#f0b429;--green:#00e676;--red:#ff1744;--blue:#00cfff;--purple:#a78bfa;--text:#c8d8e8;--dim:rgba(200,216,232,0.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,207,255,0.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(240,180,41,0.04) 0%,transparent 60%);pointer-events:none;}
.container{max-width:960px;margin:0 auto;padding:16px;}
.nav{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:10px;padding:6px;border:1px solid rgba(255,255,255,0.06);}
.nav-btn{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.nav-btn.active{background:var(--bg3);color:var(--gold);border:1px solid rgba(240,180,41,0.3);}
.page{display:none;}.page.active{display:block;}
.history-panel { background: #151924; border: 1px solid #2a2e39; border-radius: 8px; padding: 20px; color: #a0a6b5; margin-bottom: 20px;}
.history-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
.history-table th { background: #1e222d; color: #8a919e; padding: 12px; border-bottom: 1px solid #2a2e39; }
.history-table td { padding: 12px; border-bottom: 1px solid #2a2e39; }
.chart-container { position: relative; height: 250px; width: 100%; margin-bottom: 20px; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; border: 1px solid rgba(255,255,255,0.05);}
</style>
</head>
<body>
<div class="container">

<div class="nav">
  <button class="nav-btn active" onclick="showPage('history',this)">&#x1F4CB; AI 交易中心</button>
  <button class="nav-btn" onclick="alert('其他页面功能代码已折叠，专注展示AI中心')">&#x1F4C8; 行情</button>
</div>

<div class="page active" id="page-history">
  <div class="history-panel">
      <h3 style="color: #e2e8f0; border-bottom: 1px solid #2a2e39; padding-bottom: 10px; margin-top:0;">📈 累计收益表现 (Equity Curve)</h3>
      <div class="chart-container">
          <canvas id="roiChart"></canvas>
      </div>
  </div>

  <div class="history-panel">
      <h3 style="color: #e2e8f0; border-bottom: 1px solid #2a2e39; padding-bottom: 10px; margin-top:0;">🤖 AI 阵列控制台 (BTC/ETH/SOL)</h3>
      <p style="font-size: 13px;">实时监听多币种信号，微信推送已激活。每晚自动深度复盘。</p>

      <div style="overflow-x: auto; margin-top: 15px;">
          <table class="history-table">
              <thead>
                  <tr>
                      <th>时间</th>
                      <th>交易对</th>
                      <th>策略</th>
                      <th>入场价</th>
                      <th>状态 / 平仓价</th>
                      <th>收益率(ROI)</th>
                      <th>操作</th>
                  </tr>
              </thead>
              <tbody id="ai-trade-logs">
                  <tr><td colspan="7" style="padding: 20px;">正在连接云端数据库...</td></tr>
              </tbody>
          </table>
      </div>
  </div>
</div>

</div>

<script>
// ⚠️ 这里填入你的 Render 后台网址
const SERVER_URL = 'https://eth-trading-1.onrender.com';
let roiChartInstance = null;

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name === 'history') fetchAILogs(); 
}

// 绘制资金曲线
function renderROIChart(logs) {
    const ctx = document.getElementById('roiChart').getContext('2d');
    // 提取所有已平仓的记录，并按时间正序排列（最老的在前面）
    const closedLogs = logs.filter(l => l.status === 'CLOSED').reverse();
    
    let cumulativeRoi = 0;
    const labels = ['起点'];
    const dataPoints = [0];

    closedLogs.forEach(log => {
        cumulativeRoi += parseFloat(log.roi || 0);
        // 显示月/日作为标签
        const shortDate = log.entryTime.split(' ')[0].substring(5); 
        labels.push(`${log.symbol} ${shortDate}`);
        dataPoints.push(cumulativeRoi.toFixed(2));
    });

    // 动态判断最终收益是亏是赚，改变线条颜色
    const lineColor = cumulativeRoi >= 0 ? '#00e676' : '#ff1744';
    const gradient = ctx.createLinearGradient(0, 0, 0, 250);
    gradient.addColorStop(0, cumulativeRoi >= 0 ? 'rgba(0, 230, 118, 0.3)' : 'rgba(255, 23, 68, 0.3)');
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

    if (roiChartInstance) roiChartInstance.destroy();

    roiChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '累计 ROI (%)',
                data: dataPoints,
                borderColor: lineColor,
                backgroundColor: gradient,
                borderWidth: 2,
                pointBackgroundColor: '#fff',
                pointRadius: 3,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: '#8a919e', font: { size: 10 } }, grid: { display: false } },
                y: { ticks: { color: '#8a919e', font: { family: 'Orbitron' } }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
        }
    });
}

// 获取日志并渲染
async function fetchAILogs() {
    try {
        const res = await fetch(`${SERVER_URL}/api/logs`);
        const logs = await res.json();
        
        // 更新图表
        renderROIChart(logs);

        const tbody = document.getElementById('ai-trade-logs');
        if(logs.length === 0) { tbody.innerHTML = '<tr><td colspan="7">暂无记录</td></tr>'; return; }

        let html = '';
        logs.forEach(log => {
            const isLong = log.action === '做多';
            const dirStyle = isLong ? 'color: #00e676; background: rgba(0,230,118,0.1);' : 'color: #ff5252; background: rgba(255,82,82,0.1);';
            const sym = log.symbol || 'ETHUSDT'; // 兼容老数据
            // 简单区分币种颜色
            const symColor = sym.includes('BTC') ? '#f0b429' : sym.includes('SOL') ? '#a78bfa' : '#00cfff';

            let exitHtml = '', roiHtml = '-', actionHtml = '';
            
            if (log.status === 'OPEN') {
                exitHtml = `<input type="number" id="exit-${log.id}" placeholder="平仓价" style="width:70px; padding:4px; background:#0b0e14; border:1px solid #3c4253; color:white; text-align:center;">`;
                actionHtml = `<button onclick="submitCloseTrade('${log.id}')" style="background:#2962ff; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">平仓</button>`;
            } else {
                exitHtml = `<span style="color:#e2e8f0;">${log.exitPrice}</span>`;
                const isProfit = parseFloat(log.roi) > 0;
                roiHtml = `<span style="font-weight:bold; ${isProfit ? 'color:#00e676;' : 'color:#ff5252;'}">${log.roi > 0 ? '+' : ''}${log.roi}%</span>`;
                actionHtml = '<span style="color:#8a919e; font-size:12px;">✅ 结算</span>';
            }

            html += `
            <tr>
                <td style="color:#a0a6b5; font-size:11px;">${log.entryTime.split(' ')[1]}<br><span style="font-size:9px;">${log.entryTime.split(' ')[0]}</span></td>
                <td style="color:${symColor}; font-weight:bold; font-family:Orbitron;">${sym.replace('USDT','')}</td>
                <td><span style="padding:2px 6px; border-radius:3px; font-size:11px; ${dirStyle}">${log.style}${log.action}</span></td>
                <td style="color:#e2e8f0;">${log.entryPrice}</td>
                <td>${exitHtml}</td>
                <td>${roiHtml}</td>
                <td>${actionHtml}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    } catch (e) {
        document.getElementById('ai-trade-logs').innerHTML = '<tr><td colspan="7" style="color:#ff5252;">后端连接失败，请检查 Render 状态</td></tr>';
    }
}

async function submitCloseTrade(id) {
    const exitPrice = document.getElementById('exit-'+id).value;
    if (!exitPrice) { alert("⚠️ 请输入平仓价格"); return; }
    try {
        await fetch(`${SERVER_URL}/api/close`, {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, exitPrice })
        });
        fetchAILogs(); 
    } catch (e) { alert("提交失败"); }
}

fetchAILogs();
</script>
</body>
</html>
