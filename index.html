<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETH 看盘工具</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b12;
    --bg2: #0d1421;
    --bg3: #111c2e;
    --gold: #f0b429;
    --green: #00e676;
    --red: #ff1744;
    --blue: #00cfff;
    --pink: #ff6b9d;
    --text: #c8d8e8;
    --dim: rgba(200,216,232,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background: radial-gradient(ellipse at 20% 0%, rgba(0,207,255,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(240,180,41,0.04) 0%, transparent 60%);
    pointer-events:none;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(0,207,255,0.15);
  }
  .header-left {}
  .pair-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .price-display {
    font-family: 'Orbitron', monospace;
    font-size: 38px;
    font-weight: 900;
    letter-spacing: -1px;
    transition: color 0.3s;
    line-height: 1;
  }
  .price-display.up { color: var(--green); }
  .price-display.down { color: var(--red); }
  .price-display.neutral { color: #fff; }
  .change-badge {
    display: inline-block;
    margin-top: 6px;
    font-size: 13px;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .change-badge.up { color: var(--green); background: rgba(0,230,118,0.1); }
  .change-badge.down { color: var(--red); background: rgba(255,23,68,0.1); }

  /* Signal box */
  .signal-box {
    text-align: center;
    padding: 14px 24px;
    border-radius: 8px;
    border: 2px solid;
    min-width: 130px;
  }
  .signal-box.long { border-color: var(--green); background: rgba(0,230,118,0.07); }
  .signal-box.short { border-color: var(--red); background: rgba(255,23,68,0.07); }
  .signal-box.none { border-color: rgba(255,255,255,0.1); background: transparent; }
  .signal-label { font-size: 10px; letter-spacing: 3px; margin-bottom: 4px; }
  .signal-value { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; }
  .signal-box.long .signal-label, .signal-box.long .signal-value { color: var(--green); }
  .signal-box.short .signal-label, .signal-box.short .signal-value { color: var(--red); }
  .signal-box.none .signal-label, .signal-box.none .signal-value { color: var(--dim); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .signal-box.long, .signal-box.short { animation: pulse 1.8s infinite; }

  /* Interval tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab {
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--gold); color: var(--gold); }
  .tab.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 700; }

  /* Chart */
  .chart-wrap {
    background: var(--bg2);
    border: 1px solid rgba(0,207,255,0.1);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 14px;
    position: relative;
  }
  .chart-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 13px;
    background: var(--bg2); border-radius: 10px;
  }
  canvas { width: 100% !important; height: auto !important; display: block; }

  /* MA row */
  .ma-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .ma-chip {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 12px;
    display: flex; gap: 8px; align-items: center;
  }
  .ma-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Stats row */
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 100px;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .stat-value { font-size: 15px; color: #fff; }

  /* Email panel */
  .email-panel {
    background: var(--bg2);
    border: 1px solid rgba(240,180,41,0.2);
    border-radius: 10px;
    padding: 16px;
  }
  .panel-title { font-size: 10px; color: var(--gold); letter-spacing: 3px; margin-bottom: 12px; }
  .email-row { display: flex; gap: 8px; }
  .email-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 9px 14px;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .email-input:focus { border-color: var(--gold); }
  .send-btn {
    padding: 9px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
  }
  .send-btn.active { background: var(--gold); color: #000; }
  .send-btn.inactive { background: rgba(255,255,255,0.07); color: #555; cursor: not-allowed; }
  .email-status { margin-top: 8px; font-size: 12px; min-height: 18px; }
  .email-hint { margin-top: 8px; font-size: 11px; color: var(--dim); }

  /* Scan line effect */
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  body::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(transparent, rgba(0,207,255,0.06), transparent);
    animation: scanline 8s linear infinite;
    pointer-events: none;
  }

  @media (max-width: 500px) {
    .price-display { font-size: 28px; }
    .header { flex-direction: column; gap: 12px; }
    .signal-box { min-width: unset; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <div class="pair-label">ETH / USDT · 永续合约 · 币安数据</div>
      <div class="price-display neutral" id="priceDisplay">---</div>
      <span class="change-badge" id="changeBadge">加载中...</span>
    </div>
    <div class="signal-box none" id="signalBox">
      <div class="signal-label">信号</div>
      <div class="signal-value" id="signalValue">观望中</div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab" data-iv="1m">1分</button>
    <button class="tab active" data-iv="15m">15分</button>
    <button class="tab" data-iv="1h">1时</button>
    <button class="tab" data-iv="4h">4时</button>
    <button class="tab" data-iv="1d">日线</button>
  </div>

  <div class="chart-wrap">
    <div class="chart-loading" id="chartLoading">加载K线数据...</div>
    <canvas id="chart" width="860" height="300"></canvas>
  </div>

  <div class="ma-row">
    <div class="ma-chip"><div class="ma-dot" style="background:#f0b429"></div>MA5 <span id="ma5">--</span></div>
    <div class="ma-chip"><div class="ma-dot" style="background:#ff6b9d"></div>MA10 <span id="ma10">--</span></div>
    <div class="ma-chip"><div class="ma-dot" style="background:#00cfff"></div>MA20 <span id="ma20">--</span></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">24H 高</div>
      <div class="stat-value" id="high24">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">24H 低</div>
      <div class="stat-value" id="low24">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">24H 量</div>
      <div class="stat-value" id="vol24">--</div>
    </div>
  </div>

  <div class="email-panel">
    <div class="panel-title">📧 信号邮件通知（检测到新信号自动发送）</div>
    <div class="email-row">
      <input class="email-input" id="emailInput" type="email" placeholder="输入接收邮箱" value="2183089849@qq.com" />
      <button class="send-btn inactive" id="sendBtn" onclick="testSend()">测试发送</button>
    </div>
    <div class="email-status" id="emailStatus"></div>
    <div class="email-hint">⚡ 检测到做多/做空信号变化时自动发邮件提醒</div>
  </div>

</div>

<script>
const EMAILJS_SERVICE_ID = "service_op2rg49";
const EMAILJS_TEMPLATE_ID = "template_eftwoy6";
const EMAILJS_PUBLIC_KEY = "8hV-qEj_65-Yjk1Pn";

let currentInterval = "15m";
let candles = [];
let ticker = null;
let lastPrice = null;
let currentSignal = null;
let lastSignalSent = null;

// Load EmailJS
const ejsScript = document.createElement('script');
ejsScript.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
ejsScript.onload = () => emailjs.init(EMAILJS_PUBLIC_KEY);
document.head.appendChild(ejsScript);

function calcMA(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    const slice = data.slice(i - period + 1, i + 1);
    return slice.reduce((s, c) => s + c.close, 0) / period;
  });
}

function detectSignal(data) {
  if (data.length < 22) return null;
  const ma5 = calcMA(data, 5);
  const ma10 = calcMA(data, 10);
  const ma20 = calcMA(data, 20);
  const last = data.length - 1;
  const prev = last - 1;
  if (!ma5[last] || !ma10[last] || !ma20[last]) return null;

  const bull = ma5[last] > ma10[last] && ma10[last] > ma20[last] &&
               ma5[prev] <= ma10[prev] && data[last].close > ma5[last];
  const bear = ma5[last] < ma10[last] && ma10[last] < ma20[last] &&
               ma5[prev] >= ma10[prev] && data[last].close < ma5[last];

  if (bull) return { type: "LONG", label: "做多 📈", cssClass: "long" };
  if (bear) return { type: "SHORT", label: "做空 📉", cssClass: "short" };
  return null;
}

async function fetchCandles() {
  try {
    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=${currentInterval}&limit=80`);
    const data = await res.json();
    candles = data.map(d => ({
      time: d[0],
      open: parseFloat(d[1]),
      high: parseFloat(d[2]),
      low: parseFloat(d[3]),
      close: parseFloat(d[4]),
    }));
    document.getElementById('chartLoading').style.display = 'none';
    drawChart();
    updateMAs();
    updateSignal();
  } catch(e) {}
}

async function fetchTicker() {
  try {
    const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT');
    ticker = await res.json();
    updatePrice();
  } catch(e) {}
}

function updatePrice() {
  if (!ticker) return;
  const price = parseFloat(ticker.lastPrice);
  const change = parseFloat(ticker.priceChangePercent);
  const isUp = change >= 0;

  const el = document.getElementById('priceDisplay');
  if (lastPrice !== null) {
    el.className = 'price-display ' + (price > lastPrice ? 'up' : price < lastPrice ? 'down' : 'neutral');
    setTimeout(() => el.className = 'price-display neutral', 600);
  }
  lastPrice = price;
  el.textContent = price.toLocaleString('en-US', { minimumFractionDigits: 2 });

  const badge = document.getElementById('changeBadge');
  badge.className = 'change-badge ' + (isUp ? 'up' : 'down');
  badge.textContent = (isUp ? '▲ ' : '▼ ') + Math.abs(change).toFixed(2) + '% 24H';

  document.getElementById('high24').textContent = parseFloat(ticker.highPrice).toFixed(2);
  document.getElementById('low24').textContent = parseFloat(ticker.lowPrice).toFixed(2);
  const vol = parseFloat(ticker.volume);
  document.getElementById('vol24').textContent = vol > 1000 ? (vol/1000).toFixed(1)+'K' : vol.toFixed(0);
}

function updateMAs() {
  if (candles.length < 20) return;
  const ma5 = calcMA(candles, 5).at(-1);
  const ma10 = calcMA(candles, 10).at(-1);
  const ma20 = calcMA(candles, 20).at(-1);
  document.getElementById('ma5').textContent = ma5?.toFixed(2) || '--';
  document.getElementById('ma10').textContent = ma10?.toFixed(2) || '--';
  document.getElementById('ma20').textContent = ma20?.toFixed(2) || '--';
}

function updateSignal() {
  const sig = detectSignal(candles);
  currentSignal = sig;
  const box = document.getElementById('signalBox');
  const val = document.getElementById('signalValue');
  const btn = document.getElementById('sendBtn');

  if (sig) {
    box.className = 'signal-box ' + sig.cssClass;
    val.textContent = sig.label;
    btn.className = 'send-btn active';
    // Auto email on new signal
    if (sig.type !== lastSignalSent) {
      const email = document.getElementById('emailInput').value;
      if (email) {
        sendEmail(sig, false);
        lastSignalSent = sig.type;
      }
    }
  } else {
    box.className = 'signal-box none';
    val.textContent = '观望中 ⏸';
    btn.className = 'send-btn inactive';
  }
}

async function sendEmail(sig, isTest) {
  const email = document.getElementById('emailInput').value;
  if (!email) { showStatus('请填写邮箱地址', '#ff9944'); return; }
  const statusEl = document.getElementById('emailStatus');
  showStatus('发送中...', '#aaa');
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: email,
      signal: sig ? sig.label : '测试',
      price: lastPrice?.toFixed(2) || '--',
      symbol: 'ETHUSDT',
      interval: currentInterval,
      time: new Date().toLocaleString('zh-CN'),
    });
    showStatus('✅ 邮件已发送至 ' + email, '#00e676');
  } catch(e) {
    showStatus('❌ 发送失败: ' + (e.text || e.message || '未知错误'), '#ff4466');
  }
}

function testSend() {
  if (!currentSignal) return;
  sendEmail(currentSignal, true);
}

function showStatus(msg, color) {
  const el = document.getElementById('emailStatus');
  el.textContent = msg;
  el.style.color = color;
  if (msg.startsWith('✅') || msg.startsWith('❌')) {
    setTimeout(() => { el.textContent = ''; }, 5000);
  }
}

function drawChart() {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = { top: 15, bottom: 28, left: 8, right: 70 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  const display = candles.slice(-60);
  if (!display.length) return;

  const minP = Math.min(...display.map(c => c.low)) * 0.9994;
  const maxP = Math.max(...display.map(c => c.high)) * 1.0006;
  const range = maxP - minP;
  const toY = p => pad.top + cH - ((p - minP) / range) * cH;
  const gap = cW / display.length;
  const cw = Math.max(1.5, gap * 0.62);

  // Grid lines
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + (cH / 5) * i;
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const price = maxP - (range / 5) * i;
    ctx.fillStyle = 'rgba(200,216,232,0.4)';
    ctx.font = '10px Share Tech Mono, monospace';
    ctx.fillText(price.toFixed(1), W - pad.right + 5, y + 4);
  }

  // MA lines
  const maConfigs = [[calcMA(display,5),'#f0b429',1.5],[calcMA(display,10),'#ff6b9d',1.5],[calcMA(display,20),'#00cfff',1.5]];
  maConfigs.forEach(([ma, color, lw]) => {
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lw;
    let started = false;
    ma.forEach((v, i) => {
      if (!v) return;
      const x = pad.left + gap * i + gap / 2;
      if (!started) { ctx.moveTo(x, toY(v)); started = true; }
      else ctx.lineTo(x, toY(v));
    });
    ctx.stroke();
  });

  // Candles
  display.forEach((c, i) => {
    const x = pad.left + gap * i + gap / 2;
    const bull = c.close >= c.open;
    const color = bull ? '#00e676' : '#ff1744';
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, toY(c.high)); ctx.lineTo(x, toY(c.low)); ctx.stroke();
    const bTop = toY(Math.max(c.open, c.close));
    const bH = Math.max(1.5, Math.abs(toY(c.open) - toY(c.close)));
    ctx.fillRect(x - cw / 2, bTop, cw, bH);
  });
}

// Interval tabs
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentInterval = btn.dataset.iv;
  document.getElementById('chartLoading').style.display = 'flex';
  fetchCandles();
});

// Init
fetchCandles();
fetchTicker();
setInterval(fetchCandles, 10000);
setInterval(fetchTicker, 3000);
</script>
</body>
</html>
